name: Build MSPM0 Configurator

on:
  push:
    branches: [main]
    paths:
      - 'firmware/MSPM0G3507_Project/tools/mspm0_configurator/**'
      - '.github/workflows/build-mspm0-configurator.yml'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/MSPM0G3507_Project/tools/mspm0_configurator/**'
      - '.github/workflows/build-mspm0-configurator.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Protocol and settings tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/MSPM0G3507_Project/tools/mspm0_configurator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: test
    defaults:
      run:
        working-directory: firmware/MSPM0G3507_Project/tools/mspm0_configurator

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build executable
        run: python build_release.py --clean

      - name: Archive release
        working-directory: firmware/MSPM0G3507_Project/tools/release
        run: |
          7z a -tzip mspm0-configurator-windows.zip mspm0-configurator RELEASE_INFO.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mspm0-configurator-windows
          path: |
            firmware/MSPM0G3507_Project/tools/release/mspm0-configurator/
            firmware/MSPM0G3507_Project/tools/release/mspm0-configurator-windows.zip
            firmware/MSPM0G3507_Project/tools/release/RELEASE_INFO.txt
          retention-days: 30

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: firmware/MSPM0G3507_Project/tools/mspm0_configurator

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build executable
        run: python build_release.py --clean

      - name: Archive release
        working-directory: firmware/MSPM0G3507_Project/tools/release
        run: |
          tar czf mspm0-configurator-linux.tar.gz mspm0-configurator RELEASE_INFO.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mspm0-configurator-linux
          path: firmware/MSPM0G3507_Project/tools/release/mspm0-configurator-linux.tar.gz
          retention-days: 30

# Release binaries remain workflow artifacts; source pushes stay reviewable.
