name: Build MSPM0 Configurator

on:
  push:
    branches: [main]
    paths:
      - 'firmware/MSPM0G3507_Project/tools/mspm0_configurator/**'
      - '.github/workflows/build-mspm0-configurator.yml'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/MSPM0G3507_Project/tools/mspm0_configurator/**'
      - '.github/workflows/build-mspm0-configurator.yml'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    defaults:
      run:
        working-directory: firmware/MSPM0G3507_Project/tools/mspm0_configurator

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "pyinstaller>=6.0"

      - name: Build executable
        run: python build_release.py --clean

      - name: Archive release
        working-directory: firmware/MSPM0G3507_Project/tools/release
        run: |
          7z a -tzip mspm0-configurator-windows.zip mspm0-configurator RELEASE_INFO.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mspm0-configurator-windows
          path: firmware/MSPM0G3507_Project/tools/release/mspm0-configurator-windows.zip
          retention-days: 30

      - name: Commit release to repo
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd "${{ github.workspace }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firmware/MSPM0G3507_Project/tools/release/
          git commit -m "ci: build mspm0-configurator Windows release [skip ci]" || echo "No changes to commit"
          git push

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/MSPM0G3507_Project/tools/mspm0_configurator

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libegl1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "pyinstaller>=6.0"

      - name: Build executable
        run: python build_release.py --clean

      - name: Archive release
        working-directory: firmware/MSPM0G3507_Project/tools/release
        run: |
          tar czf mspm0-configurator-linux.tar.gz mspm0-configurator RELEASE_INFO.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mspm0-configurator-linux
          path: firmware/MSPM0G3507_Project/tools/release/mspm0-configurator-linux.tar.gz
          retention-days: 30