name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  host-c:
    name: Host ${{ matrix.compiler }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DAXIOM_PLATFORM=host
          -DAXIOM_BUILD_TESTS=ON
          -DAXIOM_BUILD_EXAMPLES=ON
          -DAXIOM_SELFTEST=ON
          -DCMAKE_C_COMPILER=${{ matrix.compiler }}
      - run: cmake --build build --parallel
      - run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: >
          cmake -S . -B build-san -G Ninja
          -DAXIOM_PLATFORM=host -DAXIOM_BUILD_TESTS=ON -DAXIOM_BUILD_EXAMPLES=ON
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
      - run: cmake --build build-san --parallel
      - run: ctest --test-dir build-san --output-on-failure

  python-tooling:
    name: Python 3.12 tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e "./tool[test]"
      - run: python -m pytest -q
      - run: python -m compileall -q tool/src tests
      - name: Build golden-frame encoder
        run: |
          cmake -S . -B build-golden -G Ninja \
            -DAXIOM_PLATFORM=host -DAXIOM_BUILD_TESTS=ON -DAXIOM_BUILD_EXAMPLES=OFF
          cmake --build build-golden --target generate_golden --parallel
      - run: python tool/golden/update_golden.py --check --encoder build-golden/tests/host/generate_golden
      - run: axiom-validate --golden tool/golden
      - run: python scripts/release_checks.py

  cross-compile:
    name: ARM reference compile + resources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cross compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-arm-none-eabi
      - name: ARM preset builds and budgets
        run: |
          for preset in tiny prod field dev; do
            cmake -S . -B "build-arm-${preset}" -G Ninja \
              -DAXIOM_PLATFORM=cortex-m \
              -DAXIOM_PRESET="${preset}" -DAXIOM_BUILD_TESTS=OFF -DAXIOM_BUILD_EXAMPLES=OFF \
              -DCMAKE_BUILD_TYPE=MinSizeRel -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
              -DCMAKE_C_COMPILER=arm-none-eabi-gcc \
              -DCMAKE_C_FLAGS="-mcpu=cortex-m4 -mthumb -fstack-usage"
            cmake --build "build-arm-${preset}" --parallel
            python scripts/resource_report.py --build-dir "build-arm-${preset}" \
              --size-tool arm-none-eabi-size --preset "${preset}" --enforce \
              --output "resource-reports/${preset}.json"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: arm-resource-reports
          path: resource-reports

  release-artifact:
    name: Release single header
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tool/scripts/amalgamate.py
      - name: GNU11 implementation smoke
        run: |
          cat > /tmp/axiomtrace_impl.c <<'EOF'
          #define AXIOMTRACE_IMPLEMENTATION
          #include "axiomtrace.h"
          EOF
          cat > /tmp/axiomtrace_user.c <<'EOF'
          #include "axiomtrace.h"
          int main(void) { axiom_init(); AX_EVT(INFO, 1u, 1u, (uint8_t)1u); axiom_flush(); return 0; }
          EOF
          gcc -std=gnu11 -Wall -Wextra -Werror -Idist \
            /tmp/axiomtrace_impl.c /tmp/axiomtrace_user.c -o /tmp/axiomtrace-smoke
          /tmp/axiomtrace-smoke
      - uses: actions/upload-artifact@v4
        with:
          name: axiomtrace-1.0.0-single-header
          path: dist/axiomtrace.h
